version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: academic-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: academic-content-system
    networks:
      - academic-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academic-backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/academic-content-system
      PORT: 3001
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - academic-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academic-frontend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - academic-network

volumes:
  mongodb_data:

networks:
  academic-network:
    driver: bridge
